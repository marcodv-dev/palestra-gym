<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <label for="">GYM</label>
    </div>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Montserrat:ital,wght@0,100..900&display=swap');
        body{
            display: flex;
        }
        label{
            font-family: "Audiowide", sans-serif;
            font-size: 300px;
            background: linear-gradient(to right, #108, #ff7e5f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            margin: auto;
        }
        div{
            border: 1px solid black;
            padding: 200px;
            margin: auto;
            aspect-ratio: 1;
            display: flex;
        }
    </style>
</body>
</html>
